<h2 class="mb-4">🐶 Perros en adopción</h2>

<div class="row row-cols-1 row-cols-md-3 g-4">
  @for (dog of dogs; track dog.id) {
    <div class="col">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h5 class="card-title">{{ dog.name }}</h5>
          <p class="card-text text-muted">{{ dog.description }}</p>
          <span class="badge bg-primary">{{ dog.age }} años</span>
        </div>
        <div class="card-footer">
          <button class="btn btn-outline-primary w-100">
            Quiero adoptarlo
          </button>
        </div>
      </div>
    </div>
  }
</div>
